<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>福格习惯</title>
  <script>
    // SPA redirect for GitHub Pages
    var path = window.location.pathname;
    var base = '/fogg-habit/';
    if (path !== base && !path.startsWith(base + 'assets/')) {
      window.location.replace(base + '#' + path.slice(base.length));
    }
  </script>
</head>
<body></body>
</html>
